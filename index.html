<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きもちチェック</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #eef2ff; display: flex; justify-content: center; min-height: 100vh; padding: 20px 0; }
.app { width: 100%; max-width: 390px; background: white; border-radius: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.13); overflow: hidden; align-self: flex-start; }
.header { background: linear-gradient(135deg, #43cea2, #185a9d); color: white; padding: 32px 20px 20px; }
.header-date { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
.header-title { font-size: 20px; font-weight: 900; margin-bottom: 16px; }
.tabs { display: flex; gap: 8px; }
.tab-btn { flex: 1; padding: 8px; border-radius: 20px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 800; background: rgba(255,255,255,0.25); color: white; transition: all 0.2s; }
.tab-btn.active { background: white; color: #185a9d; }
.panel { display: none; padding: 16px; }
.panel.active { display: block; }
.prog-bars { display: flex; gap: 5px; margin-bottom: 5px; }
.prog-bar { flex: 1; height: 6px; border-radius: 10px; background: #ddd; transition: background 0.3s; }
.prog-bar.done { background: #43cea2; }
.prog-text { font-size: 11px; color: #aaa; font-weight: 800; margin-bottom: 14px; }
.q-card { background: #fafafa; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 2px solid transparent; transition: border 0.2s; }
.q-card.answered { border-color: #43cea2; }
.q-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.q-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #43cea2, #185a9d); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.q-label { font-size: 10px; color: #aaa; font-weight: 800; letter-spacing: 1px; }
.q-text { font-size: 14px; font-weight: 800; color: #333; }
.emoji-row { display: flex; gap: 5px; }
.emoji-btn { flex: 1; padding: 10px 2px; border-radius: 14px; border: 2px solid #eee; background: white; cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; }
.emoji-btn.selected { border-color: #43cea2; background: rgba(67,206,162,0.12); transform: scale(1.08); }
.emoji-btn .e-icon { font-size: 20px; display: block; }
.emoji-btn .e-label { font-size: 9px; color: #aaa; font-weight: 800; display: block; margin-top: 3px; }
.emoji-btn.selected .e-label { color: #185a9d; }
.comment-card { background: #fafafa; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
.comment-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.comment-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #f093fb, #f5576c); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.comment-title { font-size: 14px; font-weight: 800; color: #333; }
.comment-input { width: 100%; height: 85px; border-radius: 12px; border: 1.5px solid #eee; padding: 10px; font-size: 13px; font-family: inherit; resize: none; background: white; color: #333; }
.submit-btn { width: 100%; padding: 15px; border-radius: 16px; border: none; font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer; transition: all 0.3s; background: #ddd; color: #aaa; }
.submit-btn.ready { background: linear-gradient(135deg, #43cea2, #185a9d); color: white; box-shadow: 0 8px 24px rgba(67,206,162,0.35); }
.done-screen { text-align: center; padding: 48px 20px; }
.done-icon { font-size: 60px; margin-bottom: 14px; }
.done-title { font-size: 22px; font-weight: 900; color: #333; margin-bottom: 8px; }
.done-sub { font-size: 13px; color: #888; line-height: 1.8; margin-bottom: 24px; }
.done-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-green { padding: 11px 24px; border-radius: 50px; border: none; background: linear-gradient(135deg, #43cea2, #185a9d); color: white; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; }
.btn-white { padding: 11px 24px; border-radius: 50px; border: 1.5px solid #eee; background: white; color: #aaa; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; }
.summary-card { background: #fafafa; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
.summary-label { font-size: 11px; font-weight: 800; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
.sum-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
.sum-table th { font-size: 11px; font-weight: 800; color: #bbb; text-align: center; padding-bottom: 4px; }
.sum-table th:first-child { text-align: left; padding-left: 8px; }
.sum-table td { background: white; text-align: center; padding: 10px 4px; font-size: 20px; }
.sum-table td:first-child { border-radius: 10px 0 0 10px; text-align: left; padding-left: 10px; font-size: 12px; font-weight: 900; color: #333; }
.sum-table td:last-child { border-radius: 0 10px 10px 0; }
.sum-table tr.this-week td { background: rgba(67,206,162,0.1); }
.sum-table tr.this-week td:first-child { color: #185a9d; }
.streak-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
.streak-badge { background: linear-gradient(135deg, #43cea2, #185a9d); color: white; font-size: 12px; font-weight: 900; padding: 5px 14px; border-radius: 50px; }
.streak-text { font-size: 12px; color: #aaa; font-weight: 700; }
.detail-title { font-size: 11px; font-weight: 800; color: #aaa; letter-spacing: 1px; margin-bottom: 10px; }
.detail-card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #ccc; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
.detail-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.detail-week { font-size: 14px; font-weight: 900; color: #333; }
.detail-period { font-size: 11px; color: #aaa; }
.detail-boxes { display: flex; gap: 6px; }
.detail-box { flex: 1; background: #f9f9f9; border-radius: 10px; padding: 8px 4px; text-align: center; }
.detail-box-label { font-size: 9px; color: #bbb; font-weight: 800; display: block; margin-bottom: 3px; }
.detail-box-emoji { font-size: 22px; display: block; }
.detail-comment { font-size: 12px; color: #888; background: #f9f9f9; border-radius: 8px; padding: 8px; margin-top: 8px; line-height: 1.6; font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-date" id="hDate"></div>
    <div class="header-title" id="hTitle">今週のきもちチェック 🌱</div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-check" onclick="showTab('check')">今週</button>
      <button class="tab-btn" id="tab-record" onclick="showTab('record')">きろく</button>
    </div>
  </div>

  <div class="panel active" id="panel-check">
    <div class="prog-bars">
      <div class="prog-bar" id="pb1"></div>
      <div class="prog-bar" id="pb2"></div>
      <div class="prog-bar" id="pb3"></div>
    </div>
    <div class="prog-text" id="prog-text">0 / 3 回答済み</div>

    <div class="q-card" id="qc1">
      <div class="q-head">
        <div class="q-icon">🏫</div>
        <div><div class="q-label">Q1</div><div class="q-text">学校生活への満足度は？</div></div>
      </div>
      <div class="emoji-row" id="er1">
        <button class="emoji-btn" onclick="selectAns(1,0,this)"><span class="e-icon">☀️</span><span class="e-label">最高！</span></button>
        <button class="emoji-btn" onclick="selectAns(1,1,this)"><span class="e-icon">🌤️</span><span class="e-label">まあまあ</span></button>
        <button class="emoji-btn" onclick="selectAns(1,2,this)"><span class="e-icon">☁️</span><span class="e-label">ふつう</span></button>
        <button class="emoji-btn" onclick="selectAns(1,3,this)"><span class="e-icon">🌧️</span><span class="e-label">つらい</span></button>
        <button class="emoji-btn" onclick="selectAns(1,4,this)"><span class="e-icon">⛈️</span><span class="e-label">しんどい</span></button>
      </div>
    </div>

    <div class="q-card" id="qc2">
      <div class="q-head">
        <div class="q-icon">👫</div>
        <div><div class="q-label">Q2</div><div class="q-text">友人関係は良好ですか？</div></div>
      </div>
      <div class="emoji-row" id="er2">
        <button class="emoji-btn" onclick="selectAns(2,0,this)"><span class="e-icon">🥰</span><span class="e-label">最高！</span></button>
        <button class="emoji-btn" onclick="selectAns(2,1,this)"><span class="e-icon">😊</span><span class="e-label">まあまあ</span></button>
        <button class="emoji-btn" onclick="selectAns(2,2,this)"><span class="e-icon">😐</span><span class="e-label">ふつう</span></button>
        <button class="emoji-btn" onclick="selectAns(2,3,this)"><span class="e-icon">😕</span><span class="e-label">微妙…</span></button>
        <button class="emoji-btn" onclick="selectAns(2,4,this)"><span class="e-icon">😞</span><span class="e-label">しんどい</span></button>
      </div>
    </div>

    <div class="q-card" id="qc3">
      <div class="q-head">
        <div class="q-icon">😴</div>
        <div><div class="q-label">Q3</div><div class="q-text">最近よく眠れていますか？</div></div>
      </div>
      <div class="emoji-row" id="er3">
        <button class="emoji-btn" onclick="selectAns(3,0,this)"><span class="e-icon">🌙</span><span class="e-label">ぐっすり</span></button>
        <button class="emoji-btn" onclick="selectAns(3,1,this)"><span class="e-icon">😪</span><span class="e-label">まあまあ</span></button>
        <button class="emoji-btn" onclick="selectAns(3,2,this)"><span class="e-icon">🥱</span><span class="e-label">ふつう</span></button>
        <button class="emoji-btn" onclick="selectAns(3,3,this)"><span class="e-icon">😵</span><span class="e-label">眠れない</span></button>
        <button class="emoji-btn" onclick="selectAns(3,4,this)"><span class="e-icon">🌑</span><span class="e-label">全然ダメ</span></button>
      </div>
    </div>

    <div class="comment-card">
      <div class="comment-head">
        <div class="comment-icon">💬</div>
        <div class="comment-title">なんでも書いていいよ（任意）</div>
      </div>
      <textarea class="comment-input" id="commentInput" placeholder="今週気になったこと、誰かに話したいこと…"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitCheck()">あと3問答えてね</button>
  </div>

  <div class="panel" id="panel-record">
    <div class="summary-card">
      <div class="summary-label">WEEKLY SUMMARY</div>
      <table class="sum-table">
        <thead><tr>
          <th></th>
          <th>🏫 学校</th>
          <th>👫 友人</th>
          <th>😴 睡眠</th>
        </tr></thead>
        <tbody id="summaryBody"></tbody>
      </table>
      <div class="streak-row">
        <div class="streak-badge">継続中 🔥</div>
        <div class="streak-text">この調子で続けよう！</div>
      </div>
    </div>
    <div class="detail-title">週ごとのくわしいきろく</div>
    <div id="detailCards"></div>
  </div>
</div>

<script>
var ans = {1: null, 2: null, 3: null};
var emojis = {
  1: ['☀️','🌤️','☁️','🌧️','⛈️'],
  2: ['🥰','😊','😐','😕','😞'],
  3: ['🌙','😪','🥱','😵','🌑']
};

function showTab(tab) {
  document.getElementById('panel-check').classList.remove('active');
  document.getElementById('panel-record').classList.remove('active');
  document.getElementById('tab-check').classList.remove('active');
  document.getElementById('tab-record').classList.remove('active');
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('hTitle').textContent = tab === 'check' ? '今週のきもちチェック 🌱' : 'きもちのきろく 📖';
  window.scrollTo(0, 0);
  if (tab === 'record') renderRecords();
}

function selectAns(q, idx, btn) {
  ans[q] = idx;
  var row = document.getElementById('er' + q);
  row.querySelectorAll('.emoji-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  document.getElementById('qc' + q).classList.add('answered');
  updateProgress();
}

function updateProgress() {
  var count = 0;
  [1,2,3].forEach(function(q) { if (ans[q] !== null) count++; });
  document.getElementById('pb1').className = 'prog-bar' + (ans[1] !== null ? ' done' : '');
  document.getElementById('pb2').className = 'prog-bar' + (ans[2] !== null ? ' done' : '');
  document.getElementById('pb3').className = 'prog-bar' + (ans[3] !== null ? ' done' : '');
  document.getElementById('prog-text').textContent = count + ' / 3 回答済み';
  var btn = document.getElementById('submitBtn');
  if (count === 3) {
    btn.textContent = '記録する ✓';
    btn.className = 'submit-btn ready';
  } else {
    btn.textContent = 'あと' + (3 - count) + '問答えてね';
    btn.className = 'submit-btn';
  }
}

function submitCheck() {
  if (ans[1] === null || ans[2] === null || ans[3] === null) return;
  var today = new Date();
  var record = {
    date: today.toISOString().split('T')[0],
    q1: emojis[1][ans[1]],
    q2: emojis[2][ans[2]],
    q3: emojis[3][ans[3]],
    comment: document.getElementById('commentInput').value
  };
  var records = JSON.parse(localStorage.getItem('mh_records') || '[]');
  records.unshift(record);
  localStorage.setItem('mh_records', JSON.stringify(records));
  document.getElementById('panel-check').innerHTML = '<div class="done-screen"><div class="done-icon">✨</div><div class="done-title">記録できたよ！</div><div class="done-sub">今週も正直に答えてくれてありがとう。<br>あなたの気持ちを大切にしていくね。</div><div class="done-btns"><button class="btn-green" onclick="showTab('record')">きろくを見る →</button><button class="btn-white" onclick="location.reload()">やり直す</button></div></div>';
}

function getStartOfWeek(d) {
  var nd = new Date(d);
  var day = nd.getDay();
  nd.setDate(nd.getDate() - day + (day === 0 ? -6 : 1));
  nd.setHours(0,0,0,0);
  return nd;
}

function getWeekDiff(dateStr) {
  var msInWeek = 7*24*60*60*1000;
  var now = getStartOfWeek(new Date());
  var rec = getStartOfWeek(new Date(dateStr));
  return Math.round((now - rec) / msInWeek);
}

function renderRecords() {
  var records = JSON.parse(localStorage.getItem('mh_records') || '[]');
  var tbody = document.getElementById('summaryBody');
  var cards = document.getElementById('detailCards');
  tbody.innerHTML = '';
  cards.innerHTML = '';
  var labels = ['今週 ✦','先週','2週前','3週前'];
  var colors = ['#43cea2','#3498db','#FF9F43','#bbb'];
  var shown = {};
  records.forEach(function(r) {
    var diff = getWeekDiff(r.date);
    if (diff < 0 || diff > 3 || shown[diff]) return;
    shown[diff] = true;
    var label = labels[diff];
    var color = colors[diff];
    var tr = document.createElement('tr');
    if (diff === 0) tr.className = 'this-week';
    tr.innerHTML = '<td>' + label + '</td><td>' + r.q1 + '</td><td>' + r.q2 + '</td><td>' + r.q3 + '</td>';
    tbody.appendChild(tr);
    var card = document.createElement('div');
    card.className = 'detail-card';
    card.style.borderLeftColor = color;
    card.innerHTML = '<div class="detail-head"><span class="detail-week">' + label + '</span><span class="detail-period">' + r.date + '</span></div><div class="detail-boxes"><div class="detail-box"><span class="detail-box-label">🏫 学校</span><span class="detail-box-emoji">' + r.q1 + '</span></div><div class="detail-box"><span class="detail-box-label">👫 友人</span><span class="detail-box-emoji">' + r.q2 + '</span></div><div class="detail-box"><span class="detail-box-label">😴 睡眠</span><span class="detail-box-emoji">' + r.q3 + '</span></div></div>' + (r.comment ? '<div class="detail-comment">' + r.comment + '</div>' : '');
    cards.appendChild(card);
  });
}

// 日付表示
document.getElementById('hDate').textContent = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

// サンプルデータ
if (!localStorage.getItem('mh_records')) {
  localStorage.setItem('mh_records', JSON.stringify([
    {date:'2026-03-17',q1:'☀️',q2:'😊',q3:'🌙',comment:'友達と放課後カフェ行った。楽しかった！'},
    {date:'2026-03-10',q1:'☁️',q2:'😕',q3:'😵',comment:'しんどかった週。眠れなかった'},
    {date:'2026-03-03',q1:'🌧️',q2:'😐',q3:'🥱',comment:''}
  ]));
}
</script>
</body>
</html>
