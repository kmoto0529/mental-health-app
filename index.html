<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きもちチェック</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background-color: #eef2ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 390px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.13); overflow: hidden; }
        header { background: linear-gradient(135deg, #43cea2, #185a9d); color: white; padding: 36px 24px 24px; text-align: center; }
        header .date { font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; }
        header .title { font-size: 1.5rem; font-weight: 800; }
        .tab-container { display: flex; justify-content: center; margin-top: 16px; gap: 10px; }
        .tab { flex: 1; text-align: center; padding: 10px 20px; cursor: pointer; font-weight: 700; border-radius: 20px; border: none; font-family: inherit; font-size: 1rem; background: rgba(255,255,255,0.3); color: white; }
        .tab.active { background: white; color: #3498db; }
        .content { display: none; padding: 20px; }
        .content.active { display: block; }
        .progress-bar { height: 10px; background: #ccc; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-bar-inner { height: 100%; width: 0; background: #43cea2; transition: width 0.3s; }
        .question-card { background: #fafafa; border-radius: 24px; padding: 15px; margin-bottom: 15px; border: 2px solid transparent; }
        .question-card.answered { border-color: #43cea2; }
        .question-header { display: flex; align-items: center; margin-bottom: 10px; }
        .question-header span { width: 40px; height: 40px; background: linear-gradient(90deg, #43cea2, #185a9d); border-radius: 8px; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; margin-right: 10px; flex-shrink: 0; }
        .emoji-options { display: flex; justify-content: space-between; }
        .emoji-options label { text-align: center; cursor: pointer; flex: 1; margin: 0 3px; padding: 10px 4px; border-radius: 16px; border: 2px solid #eee; transition: all 0.2s; }
        .emoji-options input { display: none; }
        .emoji-options label:has(input:checked) { border-color: #43cea2; background: rgba(67,206,162,0.12); transform: scale(1.08); }
        .submit-button { display: block; width: 100%; padding: 15px; text-align: center; border: none; border-radius: 24px; font-size: 1rem; font-weight: 700; cursor: pointer; background: #ccc; color: white; margin-top: 20px; font-family: inherit; }
        .submit-button.active { background: linear-gradient(90deg, #43cea2, #185a9d); }
        .comment-card { background: #fafafa; border-radius: 24px; padding: 15px; margin-top: 15px; }
        .comment-header { display: flex; align-items: center; margin-bottom: 10px; }
        .comment-header span { width: 40px; height: 40px; background: linear-gradient(90deg, #ff9a9e, #fad0c4); border-radius: 8px; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; margin-right: 10px; flex-shrink: 0; }
        .comment-textarea { width: 100%; height: 90px; border: 1px solid #ccc; border-radius: 12px; padding: 10px; font-size: 1rem; resize: none; box-sizing: border-box; font-family: inherit; }
        .summary-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .summary-table th, .summary-table td { border: 1px solid #eee; padding: 12px; text-align: center; }
        .summary-table tr.highlight { background-color: rgba(67,206,162,0.1); color: #185a9d; font-weight: 900; }
        .summary-badge { display: inline-block; padding: 6px 16px; background: linear-gradient(90deg, #43cea2, #185a9d); color: white; border-radius: 50px; font-weight: 700; margin: 10px 5px 0 0; }
        .summary-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 0; }
        .detail-card { background: white; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border-left: 3px solid #ccc; box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
        .week-header { display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 8px; }
        .period { color: gray; font-size: 0.85rem; font-weight: 400; }
        .boxes { display: flex; gap: 8px; margin-bottom: 8px; }
        .box { background: #f9f9f9; border-radius: 10px; padding: 8px; text-align: center; flex: 1; }
        .box .label { font-size: 9px; color: gray; display: block; margin-bottom: 4px; }
        .box .emoji { font-size: 22px; }
        .comment-text { background: #f9f9f9; border-radius: 8px; padding: 8px; font-size: 13px; color: #666; margin-top: 6px; }
        .done-screen { text-align: center; padding: 48px 24px; }
        .done-screen .done-icon { font-size: 64px; margin-bottom: 16px; }
        .done-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
        .done-screen p { font-size: 14px; color: #888; line-height: 1.8; margin-bottom: 24px; }
        .btn-grad { padding: 12px 28px; border-radius: 50px; border: none; background: linear-gradient(135deg, #43cea2, #185a9d); color: white; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date" id="headerDate"></div>
            <div class="title" id="headerTitle">今週のきもちチェック 🌱</div>
            <div class="tab-container">
                <button class="tab active" onclick="switchTab('check')">今週</button>
                <button class="tab" onclick="switchTab('record')">きろく</button>
            </div>
        </header>
        <div id="check" class="content active">
            <div class="progress-bar"><div class="progress-bar-inner" id="progressBar"></div></div>
            <p id="progressText">0 / 3 回答済み</p>
            <div class="question-card" id="q1card">
                <div class="question-header"><span>🏫</span><p>学校生活への満足度は？</p></div>
                <div class="emoji-options">
                    <label><input type="radio" name="q1" value="☀️" onchange="updateProgress()"><span>☀️</span></label>
                    <label><input type="radio" name="q1" value="🌤️" onchange="updateProgress()"><span>🌤️</span></label>
                    <label><input type="radio" name="q1" value="☁️" onchange="updateProgress()"><span>☁️</span></label>
                    <label><input type="radio" name="q1" value="🌧️" onchange="updateProgress()"><span>🌧️</span></label>
                    <label><input type="radio" name="q1" value="⛈️" onchange="updateProgress()"><span>⛈️</span></label>
                </div>
            </div>
            <div class="question-card" id="q2card">
                <div class="question-header"><span>👫</span><p>友人関係は良好ですか？</p></div>
                <div class="emoji-options">
                    <label><input type="radio" name="q2" value="🥰" onchange="updateProgress()"><span>🥰</span></label>
                    <label><input type="radio" name="q2" value="😊" onchange="updateProgress()"><span>😊</span></label>
                    <label><input type="radio" name="q2" value="😐" onchange="updateProgress()"><span>😐</span></label>
                    <label><input type="radio" name="q2" value="😕" onchange="updateProgress()"><span>😕</span></label>
                    <label><input type="radio" name="q2" value="😞" onchange="updateProgress()"><span>😞</span></label>
                </div>
            </div>
            <div class="question-card" id="q3card">
                <div class="question-header"><span>😴</span><p>最近よく眠れていますか？</p></div>
                <div class="emoji-options">
                    <label><input type="radio" name="q3" value="🌙" onchange="updateProgress()"><span>🌙</span></label>
                    <label><input type="radio" name="q3" value="😪" onchange="updateProgress()"><span>😪</span></label>
                    <label><input type="radio" name="q3" value="🥱" onchange="updateProgress()"><span>🥱</span></label>
                    <label><input type="radio" name="q3" value="😵" onchange="updateProgress()"><span>😵</span></label>
                    <label><input type="radio" name="q3" value="🌑" onchange="updateProgress()"><span>🌑</span></label>
                </div>
            </div>
            <div class="comment-card">
                <div class="comment-header"><span>💬</span><p>なんでも書いていいよ（任意）</p></div>
                <textarea class="comment-textarea" id="comment" placeholder="ここにコメントを入力してください"></textarea>
            </div>
            <button class="submit-button" id="submitButton" onclick="submitAnswers()">あと3問答えてね</button>
        </div>
        <div id="record" class="content">
            <div class="summary-table-container">
                <table class="summary-table">
                    <thead><tr><th>週</th><th>🏫</th><th>👫</th><th>😴</th></tr></thead>
                    <tbody id="summaryTableBody"></tbody>
                </table>
                <div class="summary-footer">
                    <span class="summary-badge">4週連続 🔥</span>
                    <span>この調子で続けよう！</span>
                </div>
            </div>
            <div id="detailCards"></div>
        </div>
    </div>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.content').forEach(el => {
                el.style.display = 'none';
                el.classList.remove('active');
            });
            const target = document.getElementById(tabId);
            if (target) { target.style.display = 'block'; target.classList.add('active'); }
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            Array.from(document.querySelectorAll('.tab')).forEach(t => {
                if (t.getAttribute('onclick') && t.getAttribute('onclick').includes(tabId)) t.classList.add('active');
            });
            const title = document.getElementById('headerTitle');
            if (title) title.textContent = tabId === 'check' ? '今週のきもちチェック 🌱' : 'きもちのきろく 📖';
            window.scrollTo(0, 0);
        }

        document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

        function updateProgress() {
            const qs = ['q1','q2','q3'];
            let count = 0;
            qs.forEach(q => {
                if (document.querySelector('input[name="'+q+'"]:checked')) {
                    count++;
                    document.getElementById(q+'card').classList.add('answered');
                }
            });
            document.getElementById('progressBar').style.width = (count/3*100)+'%';
            document.getElementById('progressText').textContent = count+' / 3 回答済み';
            const btn = document.getElementById('submitButton');
            if (count === 3) { btn.textContent = '記録する ✓'; btn.classList.add('active'); }
            else { btn.textContent = 'あと'+(3-count)+'問答えてね'; btn.classList.remove('active'); }
        }

        function submitAnswers() {
            const btn = document.getElementById('submitButton');
            if (!btn.classList.contains('active')) return;
            const record = {
                date: new Date().toISOString().split('T')[0],
                q1: document.querySelector('input[name="q1"]:checked').value,
                q2: document.querySelector('input[name="q2"]:checked').value,
                q3: document.querySelector('input[name="q3"]:checked').value,
                comment: document.getElementById('comment').value
            };
            const records = JSON.parse(localStorage.getItem('mentalHealthRecords') || '[]');
            records.unshift(record);
            localStorage.setItem('mentalHealthRecords', JSON.stringify(records));
            loadRecords();
            document.getElementById('check').innerHTML = '<div class="done-screen"><div class="done-icon">✨</div><h2>記録できたよ！</h2><p>今週も正直に答えてくれてありがとう。<br>あなたの気持ちを大切にしていくね。</p><button class="btn-grad" onclick="switchTab('record')">きろくを見る →</button></div>';
        }

        function getStartOfWeek(d) {
            const nd = new Date(d);
            const day = nd.getDay();
            nd.setDate(nd.getDate() - day + (day === 0 ? -6 : 1));
            nd.setHours(0,0,0,0);
            return nd;
        }

        function getWeekDiff(today, dateStr) {
            const msInWeek = 7*24*60*60*1000;
            const diff = getStartOfWeek(today) - getStartOfWeek(new Date(dateStr));
            return Math.round(diff / msInWeek);
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('mentalHealthRecords') || '[]');
            const tbody = document.getElementById('summaryTableBody');
            const cards = document.getElementById('detailCards');
            if (!tbody || !cards) return;
            tbody.innerHTML = ''; cards.innerHTML = '';
            const today = new Date();
            const colors = ['#43cea2','#3498db','#FF9F43','#bbb'];
            const labels = ['今週','先週','2週前','3週前'];
            records.forEach(record => {
                const diff = getWeekDiff(today, record.date);
                if (diff < 0 || diff > 3) return;
                const label = labels[diff]; const color = colors[diff];
                const row = document.createElement('tr');
                if (diff === 0) row.classList.add('highlight');
                row.innerHTML = '<td>'+label+'</td><td>'+record.q1+'</td><td>'+record.q2+'</td><td>'+record.q3+'</td>';
                tbody.appendChild(row);
                const card = document.createElement('div');
                card.className = 'detail-card';
                card.style.borderLeftColor = color;
                card.innerHTML = '<div class="week-header"><span>'+label+'</span><span class="period">'+record.date+'</span></div><div class="boxes"><div class="box"><span class="label">🏫 学校</span><span class="emoji">'+record.q1+'</span></div><div class="box"><span class="label">👫 友人</span><span class="emoji">'+record.q2+'</span></div><div class="box"><span class="label">😴 睡眠</span><span class="emoji">'+record.q3+'</span></div></div>'+(record.comment?'<div class="comment-text">'+record.comment+'</div>':'');
                cards.appendChild(card);
            });
        }

        if (!localStorage.getItem('mentalHealthRecords')) {
            localStorage.setItem('mentalHealthRecords', JSON.stringify([
                {date:'2026-03-17',q1:'☀️',q2:'😊',q3:'🌙',comment:'友達と放課後カフェ行った'},
                {date:'2026-03-10',q1:'☁️',q2:'😕',q3:'😵',comment:'しんどかった週'},
                {date:'2026-03-03',q1:'🌧️',q2:'😐',q3:'🥱',comment:''}
            ]));
        }
        loadRecords();
    </script>
</body>
</html>
