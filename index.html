<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きもちチェック</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#eef2ff;display:flex;justify-content:center;min-height:100vh;padding:20px 0}
.app{width:100%;max-width:390px;background:white;border-radius:32px;box-shadow:0 24px 64px rgba(0,0,0,0.13);overflow:hidden;align-self:flex-start}
.hdr{background:linear-gradient(135deg,#43cea2,#185a9d);color:white;padding:32px 20px 20px}
.hdr-date{font-size:12px;opacity:.8;margin-bottom:4px}
.hdr-title{font-size:20px;font-weight:900;margin-bottom:16px}
.tabs{display:flex;gap:8px}
.tab{flex:1;padding:8px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;background:rgba(255,255,255,0.25);color:white}
.tab.on{background:white;color:#185a9d}
.pnl{display:none;padding:16px}
.pnl.on{display:block}
.pbars{display:flex;gap:5px;margin-bottom:5px;height:8px;align-items:center}
.pbar{flex:1;height:8px!important;min-height:8px!important;max-height:8px!important;border-radius:10px;background:#ddd;transition:background .3s}
.pbar.done{background:#43cea2;height:8px!important;min-height:8px!important;max-height:8px!important}
.ptxt{font-size:11px;color:#aaa;font-weight:800;margin-bottom:14px}
.qcard{background:#fafafa;border-radius:20px;padding:16px;margin-bottom:12px;border:2px solid transparent;transition:border .2s}
.qcard.ok{border-color:#43cea2}
.qhead{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#43cea2,#185a9d);display:flex;justify-content:center;align-items:center;font-size:18px;flex-shrink:0}
.qlbl{font-size:10px;color:#aaa;font-weight:800;letter-spacing:1px}
.qtxt{font-size:14px;font-weight:800;color:#333}
.erow{display:flex;gap:5px}
.ebtn{flex:1;padding:10px 2px;border-radius:14px;border:2px solid #eee;background:white;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.ebtn.on{border-color:#43cea2;background:rgba(67,206,162,0.12);transform:scale(1.08)}
.eico{font-size:20px;display:block}
.elbl{font-size:9px;color:#aaa;font-weight:800;display:block;margin-top:3px}
.ebtn.on .elbl{color:#185a9d}
.cmtcard{background:#fafafa;border-radius:20px;padding:16px;margin-bottom:14px}
.cmthead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cmtico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f093fb,#f5576c);display:flex;justify-content:center;align-items:center;font-size:18px;flex-shrink:0}
.cmttxt{font-size:14px;font-weight:800;color:#333}
.cmtinput{width:100%;height:85px;border-radius:12px;border:1.5px solid #eee;padding:10px;font-size:13px;font-family:inherit;resize:none;background:white;color:#333}
.subbtn{width:100%;padding:15px;border-radius:16px;border:none;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;background:#ddd;color:#aaa;transition:all .3s}
.subbtn.go{background:linear-gradient(135deg,#43cea2,#185a9d);color:white;box-shadow:0 8px 24px rgba(67,206,162,0.35)}
.done{text-align:center;padding:48px 20px}
.done-ico{font-size:60px;margin-bottom:14px}
.done-ttl{font-size:22px;font-weight:900;color:#333;margin-bottom:8px}
.done-sub{font-size:13px;color:#888;line-height:1.8;margin-bottom:24px}
.done-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btnG{padding:11px 24px;border-radius:50px;border:none;background:linear-gradient(135deg,#43cea2,#185a9d);color:white;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.btnW{padding:11px 24px;border-radius:50px;border:1.5px solid #eee;background:white;color:#aaa;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.sumcard{background:#fafafa;border-radius:20px;padding:16px;margin-bottom:14px}
.sumlbl{font-size:11px;font-weight:800;color:#aaa;letter-spacing:1px;margin-bottom:12px}
.sumtbl{width:100%;border-collapse:separate;border-spacing:0 5px}
.sumtbl th{font-size:11px;font-weight:800;color:#bbb;text-align:center;padding-bottom:4px}
.sumtbl th:first-child{text-align:left;padding-left:8px}
.sumtbl td{background:white;text-align:center;padding:10px 4px;font-size:20px}
.sumtbl td:first-child{border-radius:10px 0 0 10px;text-align:left;padding-left:10px;font-size:12px;font-weight:900;color:#333}
.sumtbl td:last-child{border-radius:0 10px 10px 0}
.sumtbl tr.tw td{background:rgba(67,206,162,0.1)}
.sumtbl tr.tw td:first-child{color:#185a9d}
.strow{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.stbdg{background:linear-gradient(135deg,#43cea2,#185a9d);color:white;font-size:12px;font-weight:900;padding:5px 14px;border-radius:50px}
.sttxt{font-size:12px;color:#aaa;font-weight:700}
.dtitle{font-size:11px;font-weight:800;color:#aaa;letter-spacing:1px;margin-bottom:10px}
.dcard{background:white;border-radius:16px;padding:14px;margin-bottom:10px;border-left:3px solid #ccc;box-shadow:0 3px 12px rgba(0,0,0,0.06)}
.dhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dwk{font-size:14px;font-weight:900;color:#333}
.dper{font-size:11px;color:#aaa}
.dboxes{display:flex;gap:6px}
.dbox{flex:1;background:#f9f9f9;border-radius:10px;padding:8px 4px;text-align:center}
.dblbl{font-size:9px;color:#bbb;font-weight:800;display:block;margin-bottom:3px}
.dbico{font-size:22px;display:block}
.dcmt{font-size:12px;color:#888;background:#f9f9f9;border-radius:8px;padding:8px;margin-top:8px;line-height:1.6;font-weight:700}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
<div class="hdr-date" id="D"></div>
<div class="hdr-title" id="T">今週のきもちチェック 🌱</div>
<div class="tabs">
<button class="tab on" id="t1" onclick="ST('check')">今週</button>
<button class="tab" id="t2" onclick="ST('record')">きろく</button>
</div>
</div>
<div class="pnl on" id="check">
<div class="pbars"><div class="pbar" id="b1"></div><div class="pbar" id="b2"></div><div class="pbar" id="b3"></div></div>
<div class="ptxt" id="PT">0 / 3 回答済み</div>
<div class="qcard" id="c1">
<div class="qhead"><div class="qico">🏫</div><div><div class="qlbl">Q1</div><div class="qtxt">学校生活への満足度は？</div></div></div>
<div class="erow">
<button class="ebtn" onclick="SA(1,0,this)"><span class="eico">☀️</span><span class="elbl">最高！</span></button>
<button class="ebtn" onclick="SA(1,1,this)"><span class="eico">🌤️</span><span class="elbl">まあまあ</span></button>
<button class="ebtn" onclick="SA(1,2,this)"><span class="eico">☁️</span><span class="elbl">ふつう</span></button>
<button class="ebtn" onclick="SA(1,3,this)"><span class="eico">🌧️</span><span class="elbl">つらい</span></button>
<button class="ebtn" onclick="SA(1,4,this)"><span class="eico">⛈️</span><span class="elbl">しんどい</span></button>
</div></div>
<div class="qcard" id="c2">
<div class="qhead"><div class="qico">👫</div><div><div class="qlbl">Q2</div><div class="qtxt">友人関係は良好ですか？</div></div></div>
<div class="erow">
<button class="ebtn" onclick="SA(2,0,this)"><span class="eico">🥰</span><span class="elbl">最高！</span></button>
<button class="ebtn" onclick="SA(2,1,this)"><span class="eico">😊</span><span class="elbl">まあまあ</span></button>
<button class="ebtn" onclick="SA(2,2,this)"><span class="eico">😐</span><span class="elbl">ふつう</span></button>
<button class="ebtn" onclick="SA(2,3,this)"><span class="eico">😕</span><span class="elbl">微妙…</span></button>
<button class="ebtn" onclick="SA(2,4,this)"><span class="eico">😞</span><span class="elbl">しんどい</span></button>
</div></div>
<div class="qcard" id="c3">
<div class="qhead"><div class="qico">😴</div><div><div class="qlbl">Q3</div><div class="qtxt">最近よく眠れていますか？</div></div></div>
<div class="erow">
<button class="ebtn" onclick="SA(3,0,this)"><span class="eico">🌙</span><span class="elbl">ぐっすり</span></button>
<button class="ebtn" onclick="SA(3,1,this)"><span class="eico">😪</span><span class="elbl">まあまあ</span></button>
<button class="ebtn" onclick="SA(3,2,this)"><span class="eico">🥱</span><span class="elbl">ふつう</span></button>
<button class="ebtn" onclick="SA(3,3,this)"><span class="eico">😵</span><span class="elbl">眠れない</span></button>
<button class="ebtn" onclick="SA(3,4,this)"><span class="eico">🌑</span><span class="elbl">全然ダメ</span></button>
</div></div>
<div class="cmtcard">
<div class="cmthead"><div class="cmtico">💬</div><div class="cmttxt">なんでも書いていいよ（任意）</div></div>
<textarea class="cmtinput" id="CMT" placeholder="今週気になったこと…"></textarea>
</div>
<button class="subbtn" id="SB" onclick="SUB()">あと3問答えてね</button>
</div>
<div class="pnl" id="record">
<div class="sumcard">
<div class="sumlbl">WEEKLY SUMMARY</div>
<table class="sumtbl">
<thead><tr><th></th><th>🏫 学校</th><th>👫 友人</th><th>😴 睡眠</th></tr></thead>
<tbody id="SB2"></tbody>
</table>
<div class="strow"><span class="stbdg">継続中 🔥</span><span class="sttxt">この調子で続けよう！</span></div>
</div>
<div class="dtitle">週ごとのくわしいきろく</div>
<div id="DC"></div>
</div>
</div>
<script>
(function(){
  var A={1:null,2:null,3:null};
  var E={1:['☀️','🌤️','☁️','🌧️','⛈️'],2:['🥰','😊','😐','😕','😞'],3:['🌙','😪','🥱','😵','🌑']};

  function ST(tab){
    document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on')});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
    document.getElementById(tab).classList.add('on');
    document.getElementById(tab==='check'?'t1':'t2').classList.add('on');
    document.getElementById('T').textContent=tab==='check'?'今週のきもちチェック 🌱':'きもちのきろく 📖';
    window.scrollTo(0,0);
    if(tab==='record')RR();
  }

  function SA(q,i,btn){
    A[q]=i;
    btn.closest('.erow').querySelectorAll('.ebtn').forEach(function(b){b.classList.remove('on')});
    btn.classList.add('on');
    document.getElementById('c'+q).classList.add('ok');
    UP();
  }

  function UP(){
    var n=0;
    [1,2,3].forEach(function(q){if(A[q]!==null)n++});
    document.getElementById('b1').className='pbar'+(A[1]!==null?' done':'');
    document.getElementById('b2').className='pbar'+(A[2]!==null?' done':'');
    document.getElementById('b3').className='pbar'+(A[3]!==null?' done':'');
    document.getElementById('PT').textContent=n+' / 3 回答済み';
    var sb=document.getElementById('SB');
    if(n===3){sb.textContent='記録する ✓';sb.className='subbtn go';}
    else{sb.textContent='あと'+(3-n)+'問答えてね';sb.className='subbtn';}
  }

  function SUB(){
    if(A[1]===null||A[2]===null||A[3]===null)return;
    var r={date:new Date().toISOString().split('T')[0],q1:E[1][A[1]],q2:E[2][A[2]],q3:E[3][A[3]],comment:document.getElementById('CMT').value};
    var rs=JSON.parse(localStorage.getItem('mh')||'[]');
    rs.unshift(r);
    localStorage.setItem('mh',JSON.stringify(rs));
    RR();
    document.getElementById('check').innerHTML='<div class="done"><div class="done-ico">✨</div><div class="done-ttl">記録できたよ！</div><div class="done-sub">今週も正直に答えてくれてありがとう。<br>あなたの気持ちを大切にしていくね。</div><div class="done-btns"><button class="btnG" onclick="gotoRecord()">きろくを見る →</button><button class="btnW" onclick="location.reload()">やり直す</button></div></div>';
  }

  function GSW(d){var nd=new Date(d);var day=nd.getDay();nd.setDate(nd.getDate()-day+(day===0?-6:1));nd.setHours(0,0,0,0);return nd;}
  function GWD(ds){return Math.round((GSW(new Date())-GSW(new Date(ds)))/(7*24*60*60*1000));}

  function RR(){
    var rs=JSON.parse(localStorage.getItem('mh')||'[]');
    var tb=document.getElementById('SB2');
    var dc=document.getElementById('DC');
    if(!tb||!dc)return;
    tb.innerHTML='';dc.innerHTML='';
    var LB=['今週 ✦','先週','2週前','3週前'];
    var CL=['#43cea2','#3498db','#FF9F43','#bbb'];
    var seen={};
    rs.forEach(function(r){
      var d=GWD(r.date);
      if(d<0||d>3||seen[d])return;
      seen[d]=true;
      var lb=LB[d],cl=CL[d];
      var tr=document.createElement('tr');
      if(d===0)tr.className='tw';
      tr.innerHTML='<td>'+lb+'</td><td>'+r.q1+'</td><td>'+r.q2+'</td><td>'+r.q3+'</td>';
      tb.appendChild(tr);
      var cd=document.createElement('div');
      cd.className='dcard';
      cd.style.borderLeftColor=cl;
      cd.innerHTML='<div class="dhead"><span class="dwk">'+lb+'</span><span class="dper">'+r.date+'</span></div><div class="dboxes"><div class="dbox"><span class="dblbl">🏫 学校</span><span class="dbico">'+r.q1+'</span></div><div class="dbox"><span class="dblbl">👫 友人</span><span class="dbico">'+r.q2+'</span></div><div class="dbox"><span class="dblbl">😴 睡眠</span><span class="dbico">'+r.q3+'</span></div></div>'+(r.comment?'<div class="dcmt">'+r.comment+'</div>':'');
      dc.appendChild(cd);
    });
  }

  // グローバルに公開（onclickから呼べるように）
  window.ST=ST; window.SA=SA; window.SUB=SUB;
  window.gotoRecord=function(){ST('record');};

  document.getElementById('D').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  if(!localStorage.getItem('mh')){
    localStorage.setItem('mh',JSON.stringify([
      {date:'2026-03-17',q1:'☀️',q2:'😊',q3:'🌙',comment:'友達と放課後カフェ行った！'},
      {date:'2026-03-10',q1:'☁️',q2:'😕',q3:'😵',comment:'しんどかった週'},
      {date:'2026-03-03',q1:'🌧️',q2:'😐',q3:'🥱',comment:''}
    ]));
  }
})();
</script>
</body>
</html>
