<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きもちチェック</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 390px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.13);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: white;
            padding: 36px 24px 24px;
            text-align: center;
            position: relative;
        }
        header .date {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        header .title {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .tab-container {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 20px;
            cursor: pointer;
            pointer-events: auto;
            font-weight: 700;
            border-radius: 20px;
            margin: 0 5px;
            background: none; /* Reset default button background */
            font-family: inherit; /* Inherit font styles */
            font-size: inherit; /* Inherit font size */
            background: rgba(255, 255, 255, 0.8);
            color: #555;
        }
        .tab.active {
            background: white;
            color: #3498db;
        }
        .content {
            display: none;
            padding: 20px;
        }
        .content.active {
            display: block;
        }
        .progress-bar {
            height: 10px;
            background: #ccc;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar-inner {
            height: 100%;
            width: 0;
            background: #43cea2;
            transition: width 0.3s;
        }
        .question-card {
            background: #fafafa;
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid transparent;
        }
        .question-card.answered {
            border-color: #43cea2;
        }
        .question-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .question-header span {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(90deg, #43cea2, #185a9d);
            border-radius: 8px;
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
        }
        .emoji-options {
            display: flex;
            justify-content: space-between;
        }
        .emoji-options label {
            text-align: center;
            cursor: pointer;
            flex: 1;
            margin: 0 5px;
            padding: 10px;
            border-radius: 16px;
            border: 2px solid #eee;
            transition: all 0.3s;
        }
        .emoji-options input {
            display: none;
        }
        .emoji-options input:checked + span {
            border: 2px solid #43cea2;
            background: rgba(67, 206, 162, 0.12);
        }
        .submit-button {
            display: block;
            width: 100%;
            padding: 15px;
            text-align: center;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: #ccc;
            color: white;
            margin-top: 20px;
        }
        .submit-button.active {
            background: linear-gradient(90deg, #43cea2, #185a9d);
        }
        .comment-card {
            background: #fafafa;
            border-radius: 24px;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid transparent;
        }
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .comment-header span {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            border-radius: 8px;
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
        }
        .comment-textarea {
            width: 100%;
            height: 90px;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        .summary-table tr.highlight {
            background-color: rgba(67, 206, 162, 0.1);
            color: #43cea2;
        }
        .summary-badge {
            display: inline-block;
            padding: 5px 10px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .detail-card {
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 3px solid; /* Color will be dynamically set */
            box-shadow: 0 3px 14px rgba(0, 0, 0, 0.06);
        }
        .detail-card .header {
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .detail-card .header .period {
            color: gray;
            font-size: 0.9rem;
        }
        .detail-card .boxes {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .detail-card .boxes .box {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            flex: 1;
            margin: 0 4px;
        }
        .detail-card .boxes .box .label {
            font-size: 9px;
            color: gray;
            display: block;
        }
        .detail-card .boxes .box .emoji {
            font-size: 22px;
        }
        .detail-card .comment {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date">2026年3月24日</div>
            <div class="title">今週のきもちチェック 🌱</div>
            <div class="tab-container">
                <button class="tab active" data-tab="check" onclick="switchTab('check')">今週</button>
                <button class="tab" data-tab="record" onclick="switchTab('record')">きろく</button>
            </div>
        </header>
        <div id="check" class="content active">
            <div class="progress-bar">
                <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <p id="progressText">0 / 3 回答済み</p>
            <div class="question-card" id="q1">
                <div class="question-header">
                    <span>🏫</span>
                    <p>学校生活への満足度は？</p>
                </div>
                <div class="emoji-options">
                    <label><input type="radio" name="q1" value="☀️" onclick="updateProgress()"><span>☀️</span></label>
                    <label><input type="radio" name="q1" value="🌤️" onclick="updateProgress()"><span>🌤️</span></label>
                    <label><input type="radio" name="q1" value="☁️" onclick="updateProgress()"><span>☁️</span></label>
                    <label><input type="radio" name="q1" value="🌧️" onclick="updateProgress()"><span>🌧️</span></label>
                    <label><input type="radio" name="q1" value="⛈️" onclick="updateProgress()"><span>⛈️</span></label>
                </div>
            </div>
            <div class="question-card" id="q2">
                <div class="question-header">
                    <span>👫</span>
                    <p>友人関係は良好ですか？</p>
                </div>
                <div class="emoji-options">
                    <label><input type="radio" name="q2" value="🥰" onclick="updateProgress()"><span>🥰</span></label>
                    <label><input type="radio" name="q2" value="😊" onclick="updateProgress()"><span>😊</span></label>
                    <label><input type="radio" name="q2" value="😐" onclick="updateProgress()"><span>😐</span></label>
                    <label><input type="radio" name="q2" value="😕" onclick="updateProgress()"><span>😕</span></label>
                    <label><input type="radio" name="q2" value="😞" onclick="updateProgress()"><span>😞</span></label>
                </div>
            </div>
            <div class="question-card" id="q3">
                <div class="question-header">
                    <span>😴</span>
                    <p>最近よく眠れていますか？</p>
                </div>
                <div class="emoji-options">
                    <label><input type="radio" name="q3" value="🌙" onclick="updateProgress()"><span>🌙</span></label>
                    <label><input type="radio" name="q3" value="😪" onclick="updateProgress()"><span>😪</span></label>
                    <label><input type="radio" name="q3" value="🥱" onclick="updateProgress()"><span>🥱</span></label>
                    <label><input type="radio" name="q3" value="😵" onclick="updateProgress()"><span>😵</span></label>
                    <label><input type="radio" name="q3" value="🌑" onclick="updateProgress()"><span>🌑</span></label>
                </div>
            </div>
            <div class="comment-card">
                <div class="comment-header">
                    <span>💬</span>
                    <p>なんでも書いていいよ（任意）</p>
                </div>
                <textarea class="comment-textarea" id="comment" placeholder="ここにコメントを入力してください"></textarea>
            </div>
            <button class="submit-button" id="submitButton" onclick="submitAnswers()">あと3問答えてね</button>
        </div>
        <div id="record" class="content">
            <div class="summary-table-container">
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>週</th>
                            <th>🏫</th>
                            <th>👫</th>
                            <th>😴</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody">
                        <!-- Records will be dynamically added here -->
                    </tbody>
                </table>
                <div class="summary-badge">4週連続 🔥 この調子で続けよう！</div>
            </div>
            <div id="detailCards">
                <!-- Detail cards will be dynamically added here -->
            </div>
        </div>
    </div>
    <script>
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const submitButton = document.getElementById('submitButton');
        const summaryTableBody = document.getElementById('summaryTableBody');
        const detailCards = document.getElementById('detailCards');
        const commentInput = document.getElementById('comment');
        const questions = ['q1', 'q2', 'q3'];

        function updateProgress() {
            let answeredCount = 0;
            questions.forEach(q => {
                if (document.querySelector(`input[name="${q}"]:checked`)) {
                    answeredCount++;
                    document.getElementById(q).classList.add('answered');
                }
            });
            progressBar.style.width = `${(answeredCount / questions.length) * 100}%`;
            progressText.textContent = `${answeredCount} / ${questions.length} 回答済み`;

            if (answeredCount === questions.length) {
                submitButton.textContent = '記録する ✓';
                submitButton.classList.add('active');
            } else {
                submitButton.textContent = `あと${questions.length - answeredCount}問答えてね`;
                submitButton.classList.remove('active');
            }
        }

        function submitAnswers() {
            if (!submitButton.classList.contains('active')) return;

            const today = new Date();
            const record = {
                date: today.toISOString().split('T')[0], // Save the date in YYYY-MM-DD format
                q1: document.querySelector('input[name="q1"]:checked').value,
                q2: document.querySelector('input[name="q2"]:checked').value,
                q3: document.querySelector('input[name="q3"]:checked').value,
                comment: commentInput.value
            };

            saveRecord(record);
            alert('記録が完了しました！');
        }

        function saveRecord(record) {
            const records = JSON.parse(localStorage.getItem('mentalHealthRecords') || '[]');
            records.unshift(record);
            localStorage.setItem('mentalHealthRecords', JSON.stringify(records));
            loadRecords();
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('mentalHealthRecords') || '[]');
            summaryTableBody.innerHTML = '';
            detailCards.innerHTML = '';

            const today = new Date();
            const startOfWeek = getStartOfWeek(today);

            records.forEach((record, index) => {
                const recordDate = new Date(record.date);
                const weekDifference = getWeekDifference(startOfWeek, recordDate);

                let weekLabel;
                if (weekDifference === 0) {
                    weekLabel = '今週';
                } else if (weekDifference === 1) {
                    weekLabel = '先週';
                } else if (weekDifference === 2) {
                    weekLabel = '2週前';
                } else if (weekDifference === 3) {
                    weekLabel = '3週前';
                } else {
                    return; // Skip records older than 3 weeks
                }

                const row = document.createElement('tr');
                if (weekDifference === 0) row.classList.add('highlight');
                row.innerHTML = `
                    <td>${weekLabel}</td>
                    <td>${record.q1}</td>
                    <td>${record.q2}</td>
                    <td>${record.q3}</td>
                `;
                summaryTableBody.appendChild(row);

                const card = document.createElement('div');
                card.classList.add('detail-card');
                if (weekDifference === 0) card.style.borderColor = '#43cea2';
                else if (weekDifference === 1) card.style.borderColor = '#3498db';
                else if (weekDifference === 2) card.style.borderColor = '#FF9F43';
                else card.style.borderColor = '#bbb';

                card.innerHTML = `
                    <div class="header">
                        <span class="week">${weekLabel}</span>
                        <span class="period">${record.date}</span>
                    </div>
                    <div class="boxes">
                        <div class="box">
                            <span class="label">学校</span>
                            <span class="emoji">${record.q1}</span>
                        </div>
                        <div class="box">
                            <span class="label">友人</span>
                            <span class="emoji">${record.q2}</span>
                        </div>
                        <div class="box">
                            <span class="label">睡眠</span>
                            <span class="emoji">${record.q3}</span>
                        </div>
                    </div>
                    ${record.comment ? `<div class="comment">${record.comment}</div>` : ''}
                `;

                // Set border color based on week difference
                if (weekDifference === 1) card.style.borderLeftColor = '#43cea2';
                else if (weekDifference === 2) card.style.borderLeftColor = '#3498db';
                else if (weekDifference === 3) card.style.borderLeftColor = '#FF9F43';

                detailCards.appendChild(card);
            });

            const footer = document.createElement('div');
            footer.className = 'summary-footer';
            footer.innerHTML = `
                <span class="summary-badge">4週連続 🔥</span>
                <span>この調子で続けよう！</span>
            `;
            document.querySelector('.summary-table-container').appendChild(footer);
        }

        function getStartOfWeek(date) {
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1); // Adjust when day is Sunday
            return new Date(date.setDate(diff));
        }

        function getWeekDifference(startOfWeek, recordDate) {
            const msInWeek = 7 * 24 * 60 * 60 * 1000;
            return Math.floor((startOfWeek - getStartOfWeek(recordDate)) / msInWeek);
        }

        function initializeSampleData() {
            const sampleData = [
                { date: '2026-03-17', q1: '☀️', q2: '😊', q3: '🌙', comment: '友達と放課後カフェ行った' },
                { date: '2026-03-10', q1: '☁️', q2: '😕', q3: '😵', comment: 'しんどかった週' },
                { date: '2026-03-03', q1: '🌧️', q2: '😐', q3: '🥱', comment: '' }
            ];
            localStorage.setItem('mentalHealthRecords', JSON.stringify(sampleData));
        }

        // Initialize sample data if no records exist
        if (!localStorage.getItem('mentalHealthRecords')) {
            initializeSampleData();
        }

        loadRecords();
    </script>
</body>
</html>
